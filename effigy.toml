[catalog]
alias = "convergence"

[bootstrap]
setup = ["bootstrap:deps"]
start = "tui"

[tasks]
"bootstrap:deps" = "cargo fetch"
converge = "node scripts/run-converge.js {args}"
cli = "node scripts/run-converge.js {args}"
tui = "node scripts/run-converge.js {args}"
api = "node scripts/run-converge-server.js {args}"
server = "node scripts/run-converge-server.js {args}"
"trace:report" = "node scripts/agent-trace-report.js {args}"
check = "cargo check {args}"
build = "cargo build {args}"
fmt = "cargo fmt {args}"
"fmt:check" = "cargo fmt --check"
clippy = "cargo clippy --all-targets {args} -- -D warnings"
test = "node scripts/run-tests.js {args}"
"test:nextest" = "cargo nextest run -P ci {args}"
"test:cargo" = "cargo test {args}"
health = [
  { task = "fmt:check" },
  { task = "check" },
]
validate = [
  { task = "health" },
  { task = "clippy" },
  { task = "test" },
]
qa = [
  { task = "validate" },
  { task = "qa:docs" },
]
"qa:docs:links" = "effigy docs check-links"
"qa:docs:agent-defaults" = "effigy docs check-forbidden AGENTS.md README.md docs/README.md --forbid '--repo .'"
"qa:docs:headings" = "effigy docs check-headings docs/README.md docs/vision/README.md docs/roadmaps/README.md docs/logs/README.md --require-heading '## Next Task'"
"qa:docs:index:vision" = "effigy docs check-index --policy-index vision"
"qa:docs:next-action:vision" = "effigy docs check-next-action --policy vision"
"qa:northstar" = [
  { task = "qa:docs:headings" },
  { task = "qa:docs:index:vision" },
  { task = "qa:docs:next-action:vision" },
]
"qa:docs" = [
  { task = "qa:docs:links" },
  { task = "qa:docs:agent-defaults" },
  { task = "qa:northstar" },
]

[docs_policy.indexes.vision]
file = "docs/vision/README.md"
dir = "docs/vision"
section = "Vision Artifacts"

[docs_policy.next_actions.vision]
index = "vision"
heading = "## Next Task"
allowlist_file = "docs/policy/vision-next-task-verbs.txt"

[distribution.package]
name = "converge"

[distribution.publish]
binary-name = "converge"
registry-label = "local cargo install"
verify-tag-install = false
verify-binary-json-tasks = false

[distribution.closeout]
owner = "operators"
related = "docs/operators/releases-and-retention.md"
next-step = "Decide whether Effigy's optional distribution surface can now pause on the current boundary or still needs one published-consumer proof."
